<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    background:rgba(255,255,255,0.9);
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    max-width:700px;
}

h1{
    color:#e91e63;
    font-size:2.5rem;
}

p{
    font-size:1.2rem;
    color:#555;
}

.buttons{
    margin-top:30px;
}

button{
    padding:15px 35px;
    font-size:1.2rem;
    border:none;
    border-radius:50px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}

#yesBtn{
    background:#e91e63;
    color:white;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    background:#757575;
    color:white;
    position:absolute;
}

#result{
    margin-top:30px;
    font-size:1.4rem;
    color:#d81b60;
    font-weight:bold;
}

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
    top:0;
    left:0;
}

.heart{
    position:absolute;
    font-size:24px;
    animation:float 5s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>

</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container">
    <h1>Dearest Sukhpreet My Love ❤️</h1>

```
<p>
    Every day with you feels like a blessing.
    You are my happiness, my peace, and my future.
</p>

<p>
    So I have one question for you...
</p>

<h2>Will you keep loving me forever? ❤️</h2>

<div class="buttons">
    <button id="yesBtn" onclick="sayYes()">Yes ❤️</button>
    <button id="noBtn">No 💔</button>
</div>

<div id="result"></div>
```

</div>

<script>

function sayYes(){
    document.getElementById("result").innerHTML =
    "❤️ You just made me the happiest man alive! I love you forever ❤️";
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", function(){
    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
});

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 4) + "s";

    document.getElementById("hearts").appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 7000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
